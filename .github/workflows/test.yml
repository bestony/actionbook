name: Tests

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main, "release/**"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  checks: write

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/actionbook-rs/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('packages/actionbook-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        working-directory: packages/actionbook-rs
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: packages/actionbook-rs
        run: cargo clippy --all-targets -- -D warnings -A dead_code -A unused-imports -A deprecated

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        working-directory: packages/actionbook-rs
        run: cargo deny check

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        working-directory: packages/actionbook-rs
        run: cargo audit

  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Run machete
        working-directory: packages/actionbook-rs
        run: cargo machete

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/actionbook-rs
          shared-key: unit-tests

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run all unit & integration tests
        working-directory: packages/actionbook-rs
        run: |
          set -o pipefail
          cargo nextest run --lib --test cli_test --test cdp_message_parsing --profile ci 2>&1 | tee unit-test-output.txt

      - name: Test summary
        if: always()
        working-directory: packages/actionbook-rs
        run: |
          if [ -f target/nextest/ci/junit.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' target/nextest/ci/junit.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' target/nextest/ci/junit.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' target/nextest/ci/junit.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' target/nextest/ci/junit.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            echo "## Unit Tests Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Time | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Unit Tests Report" >> $GITHUB_STEP_SUMMARY
            echo "No JUnit XML found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            packages/actionbook-rs/target/nextest/ci/junit.xml
            packages/actionbook-rs/unit-test-output.txt

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: packages/actionbook-rs/target/nextest/ci/junit.xml
          check_name: Unit Test Report
          include_passed: true

  ut-coverage:
    name: UT Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/actionbook-rs
          shared-key: ut-coverage

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run coverage
        working-directory: packages/actionbook-rs
        run: |
          mkdir -p target/llvm-cov
          set -o pipefail
          cargo llvm-cov nextest --lib --test cli_test --test cdp_message_parsing --profile ci --no-fail-fast 2>&1 | tee target/llvm-cov/coverage-summary.txt
          cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info --fail-under-lines 70

      - name: Extract coverage percentage
        if: always()
        working-directory: packages/actionbook-rs
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          summary_path = pathlib.Path("target/llvm-cov/coverage-summary.txt")
          if not summary_path.exists():
              raise SystemExit("coverage summary not found")

          total_line = next((line for line in summary_path.read_text().splitlines() if line.startswith("TOTAL")), None)
          if total_line is None:
              raise SystemExit("TOTAL line not found in coverage summary")

          matches = re.findall(r"(\d+(?:\.\d+)?)%", total_line)
          if not matches:
              raise SystemExit("coverage percentage not found in TOTAL line")

          coverage = matches[-1]
          pathlib.Path("target/llvm-cov/coverage-percent.txt").write_text(f"{coverage}\n")
          print(f"LINE_COVERAGE={coverage}")
          PY

      - name: Coverage summary
        if: always()
        working-directory: packages/actionbook-rs
        run: |
          echo "## UT Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/llvm-cov/coverage-percent.txt ]; then
            COVERAGE=$(cat target/llvm-cov/coverage-percent.txt)
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Line Coverage | ${COVERAGE}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Artifacts | \`lcov.info\`, \`coverage-summary.txt\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ut-coverage-report
          path: |
            packages/actionbook-rs/target/llvm-cov/lcov.info
            packages/actionbook-rs/target/llvm-cov/coverage-summary.txt
            packages/actionbook-rs/target/llvm-cov/coverage-percent.txt

  unit-tests-macos:
    name: Unit Tests (macOS)
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/actionbook-rs/target
          key: ${{ runner.os }}-cargo-ut-${{ hashFiles('packages/actionbook-rs/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ut-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run unit tests
        working-directory: packages/actionbook-rs
        run: |
          set -o pipefail
          cargo nextest run --lib --test cli_test --test cdp_message_parsing --profile ci 2>&1 | tee unit-test-output.txt

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/actionbook-rs
          shared-key: e2e-tests

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run E2E tests
        working-directory: packages/actionbook-rs
        env:
          RUN_E2E_TESTS: "true"
        run: |
          set -o pipefail
          cargo nextest run --test e2e -j 1 --profile ci 2>&1 | tee e2e-test-output.txt

      - name: Test summary
        if: always()
        working-directory: packages/actionbook-rs
        run: |
          if [ -f target/nextest/ci/junit.xml ]; then
            TESTS=$(grep -oP 'tests="\K[0-9]+' target/nextest/ci/junit.xml | head -1)
            FAILURES=$(grep -oP 'failures="\K[0-9]+' target/nextest/ci/junit.xml | head -1)
            ERRORS=$(grep -oP 'errors="\K[0-9]+' target/nextest/ci/junit.xml | head -1)
            TIME=$(grep -oP 'time="\K[0-9.]+' target/nextest/ci/junit.xml | head -1)
            PASSED=$((TESTS - FAILURES - ERRORS))

            echo "## E2E Tests Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Time | ${TIME}s |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## E2E Tests Report" >> $GITHUB_STEP_SUMMARY
            echo "No JUnit XML found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: |
            packages/actionbook-rs/target/nextest/ci/junit.xml
            packages/actionbook-rs/e2e-test-output.txt

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: packages/actionbook-rs/target/nextest/ci/junit.xml
          check_name: E2E Test Report
          include_passed: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, cargo-deny, security-audit, unused-deps, unit-tests, ut-coverage, unit-tests-macos, e2e-tests]
    if: always()

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Lint result
          LINT_STATUS="❌ Failed"
          if [ "${{ needs.lint.result }}" = "success" ]; then
            LINT_STATUS="✅ Passed"
          fi
          echo "| Lint (fmt + clippy) | $LINT_STATUS |" >> $GITHUB_STEP_SUMMARY

          # Cargo deny result
          DENY_STATUS="❌ Failed"
          if [ "${{ needs.cargo-deny.result }}" = "success" ]; then
            DENY_STATUS="✅ Passed"
          fi
          echo "| Cargo Deny | $DENY_STATUS |" >> $GITHUB_STEP_SUMMARY

          # Security Audit result
          AUDIT_STATUS="❌ Failed"
          if [ "${{ needs.security-audit.result }}" = "success" ]; then
            AUDIT_STATUS="✅ Passed"
          fi
          echo "| Security Audit | $AUDIT_STATUS |" >> $GITHUB_STEP_SUMMARY

          # Unused deps result
          UNUSED_DEPS_STATUS="❌ Failed"
          if [ "${{ needs.unused-deps.result }}" = "success" ]; then
            UNUSED_DEPS_STATUS="✅ Passed"
          fi
          echo "| Unused Dependencies | $UNUSED_DEPS_STATUS |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status | Tests | Passed | Failed | Time |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|-------|--------|--------|------|" >> $GITHUB_STEP_SUMMARY

          # macOS Unit Tests
          if [ "${{ needs.unit-tests-macos.result }}" = "skipped" ]; then
            echo "| Unit Tests (macOS) | ⏭️ Skipped | - | - | - | - |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.unit-tests-macos.result }}" = "success" ]; then
            echo "| Unit Tests (macOS) | ✅ Passed | - | - | - | - |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests (macOS) | ❌ Failed | - | - | - | - |" >> $GITHUB_STEP_SUMMARY
          fi

          # Parse Unit Test JUnit XML
          UT_STATUS="❌ Failed"
          UT_TESTS="-" ; UT_PASSED="-" ; UT_FAILED="-" ; UT_TIME="-"
          if [ "${{ needs.unit-tests.result }}" = "success" ]; then
            UT_STATUS="✅ Passed"
          fi
          UT_XML="test-results/unit-test-results/junit.xml"
          if [ -f "$UT_XML" ]; then
            UT_TESTS=$(grep -oP 'tests="\K[0-9]+' "$UT_XML" | head -1)
            UT_FAIL=$(grep -oP 'failures="\K[0-9]+' "$UT_XML" | head -1)
            UT_ERR=$(grep -oP 'errors="\K[0-9]+' "$UT_XML" | head -1)
            UT_TIME=$(grep -oP 'time="\K[0-9.]+' "$UT_XML" | head -1)
            UT_PASSED=$((UT_TESTS - UT_FAIL - UT_ERR))
            UT_FAILED=$((UT_FAIL + UT_ERR))
            UT_TIME="${UT_TIME}s"
          fi
          echo "| Unit Tests | $UT_STATUS | $UT_TESTS | $UT_PASSED | $UT_FAILED | $UT_TIME |" >> $GITHUB_STEP_SUMMARY

          # Parse E2E Test JUnit XML
          E2E_STATUS="❌ Failed"
          E2E_TESTS="-" ; E2E_PASSED="-" ; E2E_FAILED="-" ; E2E_TIME="-"
          if [ "${{ needs.e2e-tests.result }}" = "success" ]; then
            E2E_STATUS="✅ Passed"
          fi
          E2E_XML="test-results/e2e-test-results/junit.xml"
          if [ -f "$E2E_XML" ]; then
            E2E_TESTS=$(grep -oP 'tests="\K[0-9]+' "$E2E_XML" | head -1)
            E2E_FAIL=$(grep -oP 'failures="\K[0-9]+' "$E2E_XML" | head -1)
            E2E_ERR=$(grep -oP 'errors="\K[0-9]+' "$E2E_XML" | head -1)
            E2E_TIME=$(grep -oP 'time="\K[0-9.]+' "$E2E_XML" | head -1)
            E2E_PASSED=$((E2E_TESTS - E2E_FAIL - E2E_ERR))
            E2E_FAILED=$((E2E_FAIL + E2E_ERR))
            E2E_TIME="${E2E_TIME}s"
          fi
          echo "| E2E Tests | $E2E_STATUS | $E2E_TESTS | $E2E_PASSED | $E2E_FAILED | $E2E_TIME |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | Status | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          COVERAGE_STATUS="❌ Failed"
          if [ "${{ needs.ut-coverage.result }}" = "success" ]; then
            COVERAGE_STATUS="✅ Passed"
          fi
          COVERAGE_VALUE="-"
          COVERAGE_FILE="test-results/ut-coverage-report/coverage-percent.txt"
          if [ -f "$COVERAGE_FILE" ]; then
            COVERAGE_VALUE="$(cat "$COVERAGE_FILE")%"
          fi
          echo "| Unit Test Coverage | $COVERAGE_STATUS | $COVERAGE_VALUE |" >> $GITHUB_STEP_SUMMARY

      - name: Check results
        if: needs.lint.result == 'failure' || needs.cargo-deny.result == 'failure' || needs.security-audit.result == 'failure' || needs.unused-deps.result == 'failure' || needs.unit-tests.result == 'failure' || needs.ut-coverage.result == 'failure' || needs.unit-tests-macos.result == 'failure' || needs.e2e-tests.result == 'failure'
        run: exit 1

  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always() && github.event_name == 'push'
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: test-results

      - name: Prepare Allure results
        run: |
          mkdir -p allure-results
          find test-results/unit-test-results -name "junit.xml" -exec cp {} allure-results/unit-tests-junit.xml \;
          find test-results/e2e-test-results -name "junit.xml" -exec cp {} allure-results/e2e-tests-junit.xml \;
          echo "Allure results:"
          ls -la allure-results/

      - name: Load Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Set up Java
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar -xz
          echo "$PWD/allure-2.32.0/bin" >> $GITHUB_PATH

      - name: Build Allure Report
        if: always()
        run: |
          # Copy previous history if available
          if [ -d gh-pages/test-report/history ]; then
            cp -r gh-pages/test-report/history allure-results/history
          fi
          allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages
          destination_dir: test-report

      - name: Report summary
        if: always()
        run: |
          echo "## Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[View Allure Report](https://actionbook.github.io/actionbook/test-report/)" >> $GITHUB_STEP_SUMMARY
