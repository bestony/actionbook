identity:
  author: actionbook
  name: actionbook
  label:
    en_US: Actionbook
  description:
    en_US: "Action manuals, verified selectors, and cloud browser automation for AI agents."
  icon: icon.svg
  tags:
    - utilities
    - productivity
credentials_for_provider:
  actionbook_api_key:
    type: secret-input
    required: false
    label:
      en_US: Actionbook API Key
    placeholder:
      en_US: Optional — for higher search/get quotas
    help:
      en_US: >
        Get your API key from actionbook.dev.
        Leave empty to use the free tier.
    url: https://actionbook.dev
  hyperbrowser_api_key:
    type: secret-input
    required: false
    label:
      en_US: Hyperbrowser API Key
    placeholder:
      en_US: Required for browser automation tools
    help:
      en_US: >
        Get your key from https://app.hyperbrowser.ai/.
        Required only if you use the browser tools
        (create session, operator, stop session).
    url: https://app.hyperbrowser.ai/
tools:
  - tools/search_actions.yaml
  - tools/get_action_by_area_id.yaml
  - tools/browser_create_session.yaml
  - tools/browser_stop_session.yaml
  - tools/browser_operator.yaml
extra:
  python:
    source: provider/actionbook.py
